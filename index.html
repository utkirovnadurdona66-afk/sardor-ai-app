<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sardor AI Professional</title>
<style>
:root{--bg:#0f172a;--chat:#1e293b;--acc:#6366f1;--text:#f8fafc;}
body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;}
.shell{max-width:800px;margin:auto;display:flex;flex-direction:column;height:100vh;}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;}
.msg{padding:15px;border-radius:15px;max-width:80%;}
.u{background:var(--acc);align-self:flex-end;}
.b{background:var(--chat);align-self:flex-start;border:1px solid #334155;}
.comp{padding:20px;display:flex;gap:10px;background:var(--bg);}
input{flex:1;padding:12px;border-radius:10px;border:1px solid #334155;background:var(--chat);color:white;}
button{padding:0 20px;background:var(--acc);border:none;border-radius:10px;color:white;cursor:pointer;}
</style>
</head>
<body>
<div class="shell">
<div id="chat"><div class="msg b">Sardor AI tizimi ishga tushdi.</div></div>
<div class="comp">
<input id="in" placeholder="Xabar yozing...">
<button onclick="send()">Yuborish</button>
</div>
</div>
<script>
const URL = 'https://sardor-saydurasulov-bot.onrender.com/chat';
let history = [];
async function send() {
  const input = document.getElementById('in');
  const chat = document.getElementById('chat');
  const text = input.value.trim();
  if(!text) return;
  
  const userDiv = document.createElement('div');
  userDiv.className = 'msg u';
  userDiv.textContent = text;
  chat.appendChild(userDiv);
  input.value = '';
  
  try {
    const res = await fetch(URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages: [{role: 'user', content: text}]})
    });
    const data = await res.json();
    const reply = data.content ? data.content[0].text : "Javob topilmadi.";
    
    const botDiv = document.createElement('div');
    botDiv.className = 'msg b';
    botDiv.textContent = reply;
    chat.appendChild(botDiv);
    chat.scrollTop = chat.scrollHeight;
  } catch(e) {
    alert("Server xatosi!");
  }
}
</script>
</body>
</html>
